{% extends "base.html" %}

{% block title %}Settings - Lease File Audit{% endblock %}

{% block content %}
<div class="container-fluid mt-4 px-4">
	<div class="row justify-content-center">
		<div class="col-12 col-xl-10">
			<div class="card fade-in">
				<div class="card-header d-flex justify-content-between align-items-center">
					<span><i class="fas fa-sliders-h me-2"></i>Exclusion Configuration</span>
				</div>
				<div class="card-body">
					<form method="post" action="{{ url_for('main.settings_view') }}">
						<details class="mb-3" open>
							<summary class="fw-bold mb-2">Current Excluded Resident Profile Names</summary>
							<textarea
								class="form-control"
								id="excluded_resident_profile_names"
								name="excluded_resident_profile_names"
								rows="10"
								disabled
							>{{ excluded_resident_profile_names }}</textarea>
						</details>

						<details class="mb-3" open>
							<summary class="fw-bold mb-2">Add Resident Profile Names</summary>
							<textarea
								class="form-control"
								id="add_excluded_resident_profile_names"
								name="add_excluded_resident_profile_names"
								rows="3"
								placeholder="One new name per line, case sensitive"
							></textarea>
						</details>

						<details class="mb-3" open>
							<summary class="fw-bold mb-2">Current Excluded Lease IDs</summary>
							<textarea
								class="form-control"
								id="excluded_lease_ids"
								name="excluded_lease_ids"
								rows="3"
								disabled
							>{{ excluded_lease_ids }}</textarea>
						</details>

						<details class="mb-4" open>
							<summary class="fw-bold mb-2">Add Lease IDs</summary>
							<textarea
								class="form-control"
								id="add_excluded_lease_ids"
								name="add_excluded_lease_ids"
								rows="3"
							></textarea>
						</details>

						<div class="d-flex gap-2">
							<button type="submit" class="btn btn-primary">
								<i class="fas fa-save me-2"></i>Save Settings
							</button>
							<a href="{{ url_for('main.index') }}" class="btn btn-secondary">
								<i class="fas fa-arrow-left me-2"></i>Back to Upload
							</a>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
</div>
{% endblock %}
